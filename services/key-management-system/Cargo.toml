[package]
categories  = { workspace = true }
description = { workspace = true }
edition     = { workspace = true }
keywords    = { workspace = true }
license     = { workspace = true }
name        = "logos-blockchain-key-management-system-service"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[lints]
workspace = true

[dependencies]
async-trait                        = "0.1"
lb-key-management-system-keys      = { workspace = true }
lb-key-management-system-operators = { workspace = true }
log                                = { workspace = true }
overwatch                          = { workspace = true }
serde                              = { features = ["derive"], workspace = true }
thiserror                          = { default-features = false, version = "2" }
tokio                              = { default-features = false, features = ["rt"], version = "1" }
tracing                            = { default-features = false, version = "0.1" }

[dev-dependencies]
bytes                         = { workspace = true }
lb-key-management-system-keys = { features = ["unsafe"], workspace = true }
num-bigint                    = { default-features = false, version = "0.4" }
rand                          = { features = ["getrandom"], workspace = true }
serde                         = { features = ["std"], workspace = true }
serde_yaml                    = "0.9"

[features]
unsafe = ["lb-key-management-system-keys/unsafe", "lb-key-management-system-operators/unsafe"]
