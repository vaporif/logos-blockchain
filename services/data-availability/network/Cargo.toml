[package]
categories  = { workspace = true }
description = { workspace = true }
edition     = { workspace = true }
keywords    = { workspace = true }
license     = { workspace = true }
name        = "logos-blockchain-da-network-service"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[lints]
workspace = true

[dependencies]
arc-swap    = "1"
async-trait = "0.1"
bitvec      = "1"

blake2                      = { workspace = true }
futures                     = { default-features = false, version = "0.3" }
lb-chain-broadcast-service  = { workspace = true }
lb-common-http-client       = { workspace = true }
lb-core                     = { workspace = true }
lb-da-messages              = { workspace = true }
lb-da-network-core          = { workspace = true }
lb-kzgrs-backend            = { workspace = true }
lb-libp2p                   = { workspace = true }
lb-sdp-service              = { workspace = true }
lb-services-utils           = { workspace = true }
lb-storage-service          = { workspace = true }
lb-subnetworks-assignations = { workspace = true }
lb-tracing                  = { workspace = true }
lb-utils                    = { features = ["rng"], workspace = true }
libp2p                      = { features = ["ed25519"], workspace = true }
libp2p-identity             = { version = "0.2" }
log                         = "0.4.22"
multiaddr                   = { default-features = false, version = "0.18" }
overwatch                   = { workspace = true }
rand                        = { workspace = true }
serde                       = { workspace = true, features = ["derive"] }
thiserror                   = "1"
tokio                       = { default-features = false, features = ["macros", "sync"], version = "1" }
tokio-stream                = { default-features = false, version = "0.1" }
tracing                     = { workspace = true }
url                         = { default-features = false, version = "2.5.4" }

[dev-dependencies]
lb-key-management-system-keys = { workspace = true }
