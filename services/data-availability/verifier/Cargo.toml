libp2p                      = { workspace = true }
overwatch                   = { workspace = true }
serde                       = { workspace = true }
serde_with                  = { workspace = true }
thiserror                   = "1.0"
tokio                       = { default-features = false, version = "1" }
tokio-stream                = { default-features = false, version = "0.1.15" }
