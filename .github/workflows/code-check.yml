on:
  pull_request:
  push:
    branches: [ master ]

name: Code checks

concurrency:
  group: ${{ github.workflow }}@${{ github.ref }}
  cancel-in-progress: true

jobs:
  formatting:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2  # Version 4.2.2
      - name: Install nightly toolchain
        uses: actions-rs/toolchain@88dc2356392166efad76775c878094f4e83ff746  # Version 1.0.6
        with:
          # The same version must be used in the `.pre-commit-config.yaml` file
          toolchain: nightly-2025-12-05
          profile: minimal
          components: rustfmt
          override: true
      - name: Run cargo fmt
        uses: actions-rs/cargo@9e120dd99b0fbad1c065f686657e914e76bd7b72  # Version 1.0.1
        with:
          command: fmt
          args: --all --check
      - name: Install taplo CLI
        run: cargo install taplo-cli --locked --version 0.10.0
      - name: Run taplo lint
        run: taplo lint
      - name: Run taplo fmt
        run: taplo fmt --check

  cargo-deny:
    name: Check cargo-deny rules
    # `cargo-deny` action is only supported on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2  # Version 4.2.2

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      # `cargo-deny`'s action is compiled and run using `musl` but we generally use `gnu` in our local machines.
      # Thus, results may differ from local runs.
      # To avoid this, we install and run `cargo-deny` manually.
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.0

      - name: Run cargo-deny
        run: cargo-deny --locked --all-features check --hide-inclusion-graph -c .cargo-deny.toml --show-stats -D warnings

  features:
    name: Check packages feature combinations
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Using self-hosted runners because we were running out of memory on GitHub-hosted runners
          - os: [self-hosted, Linux]
            label: self-hosted-linux
          - os: [self-hosted, macOS]
            label: self-hosted-macos
    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2  # Version 4.2.2
      - name: Setup Circuits
        uses: ./.github/actions/setup-circuits
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-hack
        uses: taiki-e/install-action@5651179950649c44da31d346537e20c0534f0f25  # Version 2.49.35
        with:
          tool: cargo-hack

      - name: Set up Cargo cache
        uses: ./.github/actions/setup-cargo-cache
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          key-prefix: code-check/feature-combinations/${{ matrix.platform.label }}

      - name: Run Cargo Hack Check (Cache-Aware)
        uses: ./.github/actions/cargo-hack-check-cached

      - name: Update Cargo cache
        if: success() || failure()
        uses: ./.github/actions/update-cargo-cache
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          key-prefix: code-check/feature-combinations/${{ matrix.platform.label }}
      
      - name: Clean up build artifacts
        if: success() || failure()
        uses: actions-rs/cargo@9e120dd99b0fbad1c065f686657e914e76bd7b72  # Version 1.0.1
        with:
          command: clean

  unused-deps:
    name: Check for unused dependencies
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2  # Version 4.2.2
      - name: Install cargo-machete
        uses: bnjbvr/cargo-machete@9f0895d780783da0089162cae9668f6ec6e896c4  # Version 0.8.0
        # This step also runs `cargo-machete` without the `--with-metadata` flag, which can trigger more false positives.
        # We ignore errors and run `cargo-machete` with the `--with-metadata` flag for the actual result.
        continue-on-error: true
      - name: Run cargo-machete
        run: cargo machete --with-metadata
  
  lints:
    name: Check Rust lints
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: -D warnings
    steps:
      - name: Checkout repository
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2  # Version 4.2.2

      - name: Set up Cargo cache
        uses: ./.github/actions/setup-cargo-cache
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          key-prefix: code-check/lints/${{ matrix.os }}

      - name: Setup Circuits
        uses: ./.github/actions/setup-circuits
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cargo clippy on workspace
        uses: actions-rs/cargo@9e120dd99b0fbad1c065f686657e914e76bd7b72  # Version 1.0.1
        with:
          command: clippy
          args: --locked --all --all-targets --all-features

      - name: Update Cargo cache
        if: success() || failure()
        uses: ./.github/actions/update-cargo-cache
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          key-prefix: code-check/lints/${{ matrix.os }}
 
  tests:
    name: Run test suite
    if: ${{ !startsWith(github.event.pull_request.title, '[WIP]') && !contains(github.event.label.name,  'DO NOT MERGE') }}
    strategy:
      fail-fast: false # all OSes should be tested even if one fails (default: true)
      matrix:
        os:
          # Using self-hosted runners because we were running out of memory on GitHub-hosted runners
          - [ self-hosted, Linux ]
          - [ self-hosted, macOS ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Disable rustup override
        run: rustup override unset

      - name: Checkout repository
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2  # Version 4.2.2

      - name: Setup Circuits
        uses: ./.github/actions/setup-circuits
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run the node binary to check the config file validity
        uses: actions-rs/cargo@9e120dd99b0fbad1c065f686657e914e76bd7b72  # Version 1.0.1
        with:
          command: run
          args: --locked -p logos-blockchain-node -- nodes/node/config.yaml --check-config

      - name: Run the node binary with the testing feature to check the one-node config files validity
        uses: actions-rs/cargo@9e120dd99b0fbad1c065f686657e914e76bd7b72  # Version 1.0.1
        with:
          command: run
          args: >-
            --locked -p logos-blockchain-node --features testing 
            -- nodes/node/config-one-node.yaml --check-config --deployment nodes/node/one-node-custom-deployment.yaml

      - name: Install cargo-nextest
        uses: taiki-e/install-action@5651179950649c44da31d346537e20c0534f0f25 # Version 2.49.35
        with:
          tool: cargo-nextest

      - name: Cargo test all except PoL and end-to-end integration tests
        uses: actions-rs/cargo@9e120dd99b0fbad1c065f686657e914e76bd7b72  # Version 1.0.1
        env:
          CONSENSUS_SLOT_TIME: 5
        with:
          command: nextest
          # - We don't test benches as they take 6h+, leading to a timeout
          # - We aslo do not test end-to-end integration tests here as those are run in a dedicated step below
          args: >-
            run --workspace --locked --lib --bins --examples --tests --retries 2
            --all-features --no-fail-fast --exclude logos-blockchain-tests

      - name: Cargo test PoL proof generation and verification
        uses: actions-rs/cargo@9e120dd99b0fbad1c065f686657e914e76bd7b72  # Version 1.0.1
        with:
          command: nextest
          # TODO: Enable all tests after adapting them to PoL
          args: >-
            run --locked --lib --bins --examples --tests --retries 2
            -p logos-blockchain-chain-leader-service -p logos-blockchain-pol 
            --no-fail-fast

      - name: Clean up build artifacts
        if: success() || failure()
        uses: actions-rs/cargo@9e120dd99b0fbad1c065f686657e914e76bd7b72  # Version 1.0.1
        with:
          command: clean

      - name: Upload integration tests results
        uses: actions/upload-artifact@6027e3dd177782cd8ab9af838c04fd81a07f1d47 # Version 4.6.2
        if: failure()
        with:
          name: integration-test-artifacts-${{ runner.os }}-${{ github.sha }}
          include-hidden-files: true
          path: tests/.tmp*
  
  build-docker:
    name: Docker build
    if: ${{ !startsWith(github.event.pull_request.title, '[WIP]') && !contains(github.event.label.name,  'DO NOT MERGE') }}
    needs:
      - formatting
      - cargo-deny
      - unused-deps
      - lints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2  # Version 4.2.2
      - name: Setup docker buildx
        uses: docker/setup-buildx-action@afeb29a6e0d7d6258844ecabe6eba67d13443680  # Version 3.1.0
      - name: Build Docker Image
        uses: docker/build-push-action@84ad562665bb303b549fec655d1b64f9945f3f91  # Version 6.15.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
