on:
  pull_request:
  push:
    branches: [ master ]

name: End-to-end integration tests (including cucumber)

# Ensure only one workflow run per branch/workflow is active at a time.
# Cancels any in-progress runs for the same group to avoid overlap.
concurrency:
  group: ${{ github.workflow }}@${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Run end-to-end integration tests (including cucumber)

    # Only run if not a WIP or DO NOT MERGE PR
    if: >
      ${{
        github.event_name != 'pull_request' ||
        (
          !startsWith(github.event.pull_request.title, '[WIP]') &&
          !contains(toJson(github.event.pull_request.labels), 'DO NOT MERGE')
        )
      }}

    strategy:
      # All OSes should be tested even if one fails (default: true)
      fail-fast: false
      matrix:
        platform:
          # Using self-hosted runners because we were running out of memory on GitHub-hosted runners
          - os: [self-hosted, Linux]
            label: self-hosted-linux
          - os: [self-hosted, macOS]
            label: self-hosted-macos
    runs-on: ${{ matrix.platform.os }}

    steps:
      # Remove any rustup override to ensure default toolchain is used
      - name: Disable rustup override
        run: rustup override unset || true

      # Checkout the repository code
      # Notes:
      # - We need to test the exact PR code, immutable, no synthetic merge commit from master
      # - For PRs we use `github.event.pull_request.head.sha` - the exact commit from the PR branch
      # - For pushes to master this falls back to `github.sha` - the commit that triggered the workflow
      # - Uses SHA (immutable) rather than branch name (which could move during workflow execution)
      # - You control integration - manually merge/rebase when YOU decide the PR is ready
      - name: Checkout repository
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2  # Version 4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # Set up custom circuits required for tests
      - name: Setup Circuits
        uses: ./.github/actions/setup-circuits
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Set environment variables for circuits path - expand $HOME first since GitHub Actions env: blocks don't expand
      # shell variables
      - name: Set circuits path environment variable (new)
        run: echo "LOGOS_BLOCKCHAIN_CIRCUITS=$HOME/.logos-blockchain-circuits" >> $GITHUB_ENV

      # Prune before any builds.
      - name: Prune disk space (cache-aware, self-hosted)
        uses: ./.github/actions/prune-disk-space

      - name: Install cargo-nextest
        uses: taiki-e/install-action@5651179950649c44da31d346537e20c0534f0f25 # Version 2.49.35
        with:
          tool: cargo-nextest

      # Build release binary for logos-blockchain-node (so runtimes can be reduced)
      - name: Build binaries with required features
        uses: actions-rs/cargo@9e120dd99b0fbad1c065f686657e914e76bd7b72
        with:
          command: build
          args: --locked --release --all
        env:
          CARGO_INCREMENTAL: 0  # Disable incremental compilation

      - name: End-to-end integration tests
        timeout-minutes: 90
        uses: actions-rs/cargo@9e120dd99b0fbad1c065f686657e914e76bd7b72  # Version 1.0.1
        with:
          command: nextest
          # - We don't test benches as they take 6h+, leading to a timeout
          args: run --locked --jobs 1 --retries 2 -p logos-blockchain-tests --no-fail-fast

      - name: Upload integration tests results
        uses: actions/upload-artifact@6027e3dd177782cd8ab9af838c04fd81a07f1d47 # Version 4.6.2
        if: failure()
        with:
          name: integration-test-artifacts-${{ runner.os }}-${{ github.sha }}
          include-hidden-files: true
          path: tests/.tmp*

      # Run cucumber integration tests with environment variables for binaries and test params
      # Special exclusion tags (we want to run the rest of the tests and not fail the workflow):
      # - @broken = tests that are broken and must still be fixed
      # - @undefined_behaviour = tests that trigger undefined system-level behaviour in the logos-blockchain-node binary

      # Feature: Smoke (@smoke_ci)
      - name: Run cucumber - @smoke_ci
        # Run regardless of success/failure of the previous step, but do not start if a cancellation is in progress.
        if: ${{ !cancelled() }}
        timeout-minutes: 60  # Safety net timeout - this needs to be adjusted as more tests are added
        uses: actions-rs/cargo@9e120dd99b0fbad1c065f686657e914e76bd7b72
        env:
          CUCUMBER_LOG_LEVEL: debug
        with:
          command: test
          args: >-
            --locked -p logos-blockchain-tests --features cucumber
            --test cucumber -- --tags "@smoke_ci and not (@broken or @undefined_behaviour)"

      # On failure, upload cucumber logs and artifacts for debugging
      - name: Upload cucumber logs on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@6027e3dd177782cd8ab9af838c04fd81a07f1d47
        with:
          name: cucumber-artifacts-${{ runner.os }}-${{ github.sha }}-smoke  # ✅ Unique per OS
          include-hidden-files: true
          path: ${{ github.workspace }}/tests/cucumber_tests/temp/cucumber_artefacts/Smoke/**

      # Feature: Cryptarchia (@cryptarchia_ci)
      - name: Run cucumber - @cryptarchia_ci
        # Run regardless of success/failure of the previous step, but do not start if a cancellation is in progress.
        if: ${{ !cancelled() }}
        timeout-minutes: 60  # Safety net timeout - this needs to be adjusted as more tests are added
        uses: actions-rs/cargo@9e120dd99b0fbad1c065f686657e914e76bd7b72
        env:
          CUCUMBER_LOG_LEVEL: debug
        with:
          command: test
          args: >-
            --locked -p logos-blockchain-tests --features cucumber
            --test cucumber -- --tags "@cryptarchia_ci and not (@broken or @undefined_behaviour)"

      # On failure, upload cucumber logs and artifacts for debugging
      - name: Upload cucumber logs on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@6027e3dd177782cd8ab9af838c04fd81a07f1d47
        with:
          name: cucumber-artifacts-${{ runner.os }}-${{ github.sha }}-cryptarchia  # ✅ Unique per OS
          include-hidden-files: true
          path: ${{ github.workspace }}/tests/cucumber_tests/temp/cucumber_artefacts/Cryptarchia/**

      # Feature: Transactions (@transactions_ci)
      - name: Run cucumber - @transactions_ci
        # Run regardless of success/failure of the previous step, but do not start if a cancellation is in progress.
        if: ${{ !cancelled() }}
        timeout-minutes: 60  # Safety net timeout - this needs to be adjusted as more tests are added
        uses: actions-rs/cargo@9e120dd99b0fbad1c065f686657e914e76bd7b72
        env:
          CUCUMBER_LOG_LEVEL: debug
        with:
          command: test
          args: >-
            --locked -p logos-blockchain-tests --features cucumber
            --test cucumber -- --tags "@transactions_ci and not (@broken or @undefined_behaviour)"

      # On failure, upload cucumber logs and artifacts for debugging
      - name: Upload cucumber logs on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@6027e3dd177782cd8ab9af838c04fd81a07f1d47
        with:
          name: cucumber-artifacts-${{ runner.os }}-${{ github.sha }}-transactions  # ✅ Unique per OS
          include-hidden-files: true
          path: ${{ github.workspace }}/tests/cucumber_tests/temp/cucumber_artefacts/Transactions/**

      # Always upload JUnit test results for reporting, even if tests fail
      - name: Upload cucumber JUnit results
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@6027e3dd177782cd8ab9af838c04fd81a07f1d47 # v4.6.2
        with:
          name: cucumber-junit-${{ runner.os }}  # ✅ Unique per OS
          path: ${{ github.workspace }}/tests/cucumber_tests/temp/cucumber-output-junit.xml
          if-no-files-found: warn

      # Always publish a test report for visibility, do not fail workflow if this step fails
      - name: Publish cucumber test report
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: dorny/test-reporter@v1
        with:
          name: Cucumber-${{ runner.os }}  # Optional: distinguish Linux vs macOS
          path: ${{ github.workspace }}/tests/cucumber_tests/temp/cucumber-output-junit.xml
          reporter: java-junit

      - name: Clean up build artifacts
        if: success() || failure()
        uses: actions-rs/cargo@9e120dd99b0fbad1c065f686657e914e76bd7b72  # Version 1.0.1
        with:
          command: clean

      - name: Clean up cucumber artifacts
        if: success() || failure()
        run: rm -rf ${{ github.workspace }}/tests/cucumber_tests/temp/cucumber_artefacts
