port: 4400
n_hosts: 4
timeout: 10

faucet_settings:
  enabled: true

deployment_settings_storage_path:
  deployment-settings.yaml

mode: Run

# Tracing
tracing_settings:
  logger:
    otlp:
      endpoint: "http://otel:4317"
      service_name: "init_node"
    stdout: false
    stderr: false
    file:
      directory: "./state/logs"
    loki: null
    gelf: null
  tracing: None
  filter: None
  metrics: !Otlp
    endpoint: "http://otel:4317"
    host_identifier: "init_node"
  console: None
  level: "DEBUG"
