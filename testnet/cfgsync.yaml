port: 4400
n_hosts: 4
timeout: 10

faucet_settings:
  note_count: 3
  note_value: 10000000

deployment_settings_storage_path:
  deployment-settings.yaml

mode: Run

# Tracing
tracing_settings:
  logger:
    otlp:
      endpoint: "http://devnet.blockchain.logos.co:3100"
      service_name: "init_node"
    stdout: true
    stderr: false
    file:
      directory: "./state/logs"
    loki: null
    gelf: null
  tracing: None
  filter: None
  metrics: None
  console: None
  level: "DEBUG"
