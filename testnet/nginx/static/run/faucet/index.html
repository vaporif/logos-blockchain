<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./../style/base.css">
    <link rel="stylesheet" href="./../style/faucet.css">
    <title>Logos Devnet Faucet</title>
</head>
<body>
    <a class="logo" href="../"><img class="icon-svg" src="./../assets/logos.svg" /></a>
    <h1>Logos Faucet</h1>

    <div class="field">
        <label for="pk">Destination Public Key (Hex)</label>
        <input type="text" id="pk" placeholder="e.g. 7d069d39...">
    </div>

    <button id="sendBtn">Request Funds</button>

    <div id="response"></div>

    <footer style="margin-top: 2rem; border-top: 1px solid #ccc; padding-top: 1rem; display: flex; gap: 10px; align-items: center;">
        <a href="https://docs.google.com/document/d/1GOQTbBX152uVIrmXXW9TIoSJXCP5fsqh149jXZO_pLE/edit?usp=sharing" target="_blank" rel="noopener noreferrer" style="font-size: 0.9rem; color: #666; text-decoration: none;">Logos Testnet Terms & Conditions</a>
        <span style="color: #ccc;">|</span>
        <a href="https://docs.google.com/document/d/1qQ-eupBjqNnU0EfSWgCwiP164BmXsKWvMHJYyJqOUh8/edit?usp=sharing" target="_blank" rel="noopener noreferrer" style="font-size: 0.9rem; color: #666; text-decoration: none;">Logos Testnet Privacy Policy</a>
    </footer>

    <script>
        const btn = document.getElementById('sendBtn');
        const respDiv = document.getElementById('response');

        btn.onclick = async () => {
            const pk = document.getElementById('pk').value.trim();

            if (!pk) return alert("Please enter a Public Key");

            btn.disabled = true;
            respDiv.style.display = 'none';
            respDiv.className = '';

            try {
                const response = await fetch(`./../faucet-backend/${pk}`, {
                    method: 'POST'
                });

                const text = await response.text();
                respDiv.style.display = 'block';
                
                if (response.ok) {
                    const data = JSON.parse(text); 
                    const hash = data.hash;
                    const explorerUrl = `https://devnet.blockchain.logos.co/web/explorer/transactions/${hash}`;

                    respDiv.className = 'success';
                    respDiv.innerHTML = `
                        <strong>Success!</strong><br>
                        <p>Transaction hash: <code>${hash.substring(0, 8)}...</code></p>
                        <a href="${explorerUrl}" target="_blank" rel="noopener noreferrer">
                            View in Explorer
                        </a>
                    `;
                } else {
                    respDiv.className = 'error';
                    respDiv.innerHTML = `<strong>Error:</strong><br>${text}`;
                }
            } catch (err) {
                respDiv.style.display = 'block';
                respDiv.className = 'error';
                respDiv.innerText = "Network error: " + err.message;
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
