[package]
categories  = { workspace = true }
description = "Simple sequencer for demo - receives HTTP transactions and submits to Logos blockchain node"
edition     = { workspace = true }
keywords    = { workspace = true }
license     = { workspace = true }
name        = "logos-blockchain-demo-sequencer"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[lints]
workspace = true

[dependencies]
axum                             = { features = ["http1", "http2", "json", "tokio"], workspace = true }
hex                              = { workspace = true }
lb-common-http-client            = { workspace = true }
lb-core                          = { workspace = true }
lb-key-management-system-service = { workspace = true }
owo-colors                       = { workspace = true }
rand                             = { workspace = true }
redb                             = { workspace = true }
reqwest                          = { features = ["json", "rustls-tls"], workspace = true }
serde                            = { features = ["derive"], workspace = true }
serde_json                       = { workspace = true }
thiserror                        = { workspace = true }
tokio                            = { features = ["macros", "net", "rt-multi-thread", "signal", "sync"], workspace = true }
tokio-util                       = { workspace = true }
tower-http                       = { features = ["cors"], workspace = true }
tracing                          = { workspace = true }
tracing-subscriber               = { features = ["env-filter"], workspace = true }
