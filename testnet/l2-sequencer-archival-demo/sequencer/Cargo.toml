[package]
categories  = { workspace = true }
description = "Simple sequencer for demo - receives HTTP transactions and submits to Logos blockchain node"
edition     = { workspace = true }
keywords    = { workspace = true }
license     = { workspace = true }
name        = "logos-blockchain-demo-sequencer"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[lints]
workspace = true

[dependencies]
axum                             = { default-features = false, features = ["http1", "http2", "json", "tokio"], version = "0.7.5" }
hex                              = "0.4"
lb-common-http-client            = { workspace = true }
lb-core                          = { workspace = true }
lb-key-management-system-service = { workspace = true }
owo-colors                       = { default-features = false, version = "4.2.3" }
rand                             = { workspace = true }
redb                             = "2.2"
reqwest                          = { features = ["json", "rustls-tls"], workspace = true }
serde                            = { features = ["derive"], workspace = true }
serde_json                       = { workspace = true }
thiserror                        = { workspace = true }
tokio                            = { features = ["macros", "net", "rt-multi-thread", "signal", "sync"], workspace = true }
tokio-util                       = { version = "0.7" }
tower-http                       = { features = ["cors"], version = "0.6.8" }
tracing                          = { workspace = true }
tracing-subscriber               = { features = ["env-filter"], version = "0.3" }
