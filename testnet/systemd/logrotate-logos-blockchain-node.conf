# Logrotate configuration for Logos Blockchain Node
#
# OPTIONAL: Only needed if you enabled file logging in the systemd service
# (StandardOutput/StandardError lines uncommented)
#
# To install:
#   sudo cp logrotate-logos-blockchain-node.conf /etc/logrotate.d/logos-blockchain-node
#   sudo nano /etc/logrotate.d/logos-blockchain-node
#   # Replace <username> with your actual username

/home/<username>/logos-blockchain-node.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
