# TODO: Re-enable commented out dependencies and tests once the nomos->logos-blockchain PR is merged and the testing framework updated accordingly.

[package]
categories  = { workspace = true }
description = { workspace = true }
edition     = { workspace = true }
keywords    = { workspace = true }
license     = { workspace = true }
name        = "logos-blockchain-tests"
publish     = false
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[lints]
workspace = true

[dependencies]
async-trait = "0.1"
blst        = { version = "0.3.11" }
# cucumber    = "=0.22.0"
# cucumber_ext                                   = { git = "https://github.com/logos-blockchain/logos-blockchain-testing.git", branch = "master" }
futures                          = { default-features = false, version = "0.3" }
futures-util                     = { default-features = false, version = "0.3.31" }
hex                              = { default-features = false, version = "0.4.3" }
lb-api-service                   = { workspace = true }
lb-blend-service                 = { features = ["libp2p"], workspace = true }
lb-chain-broadcast-service       = { workspace = true }
lb-chain-leader-service          = { workspace = true }
lb-chain-network-service         = { workspace = true }
lb-chain-service                 = { workspace = true }
lb-common-http-client            = { workspace = true }
lb-core                          = { workspace = true }
lb-cryptarchia-engine            = { features = ["serde"], workspace = true }
lb-cryptarchia-sync              = { workspace = true }
lb-da-dispersal-service          = { workspace = true }
lb-da-network-core               = { workspace = true }
lb-da-network-service            = { workspace = true }
lb-da-sampling-service           = { workspace = true }
lb-da-verifier-service           = { workspace = true }
lb-executor                      = { default-features = false, features = ["testing", "tracing"], workspace = true }
lb-executor-http-client          = { workspace = true }
lb-groth16                       = { workspace = true }
lb-http-api-common               = { workspace = true }
lb-key-management-system-service = { workspace = true }
lb-kzgrs-backend                 = { workspace = true }
lb-libp2p                        = { workspace = true }
lb-network-service               = { features = ["libp2p"], workspace = true }
lb-node                          = { default-features = false, features = ["testing"], workspace = true }
lb-sdp-service                   = { workspace = true }
lb-subnetworks-assignations      = { workspace = true }
lb-time-service                  = { workspace = true }
lb-tracing                       = { workspace = true }
lb-tracing-service               = { workspace = true }
lb-tx-service                    = { features = ["libp2p", "mock"], workspace = true }
lb-utils                         = { workspace = true }
lb-wallet-service                = { workspace = true }
num-bigint                       = { default-features = false, version = "0.4" }
rand                             = { workspace = true }
reqwest                          = { features = ["json"], workspace = true }
serde_json                       = "1.0"
serde_yaml                       = "0.9"
serial_test                      = "3.1.1"
tempfile                         = { workspace = true }
# testing-framework-core                         = { git = "https://github.com/logos-blockchain/logos-blockchain-testing.git", branch = "master" }
# testing-framework-runner-local                 = { git = "https://github.com/logos-blockchain/logos-blockchain-testing.git", branch = "master" }
# testing-framework-workflows                    = { git = "https://github.com/logos-blockchain/logos-blockchain-testing.git", branch = "master" }
time    = { default-features = false, version = "0.3" }
tokio   = "1"
tracing = { workspace = true }
# tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[[test]]
name = "test_cryptarchia_happy_path"
